- title: How much of X is in my sample?
  icon: /img/icons/material-symbols/200/rounded/performance_max.svg
  description: Concentration measurement. Calibrated quantitation using reference standards. The most common thing our customers ask for.

- title: How pure is my compound?
  icon: /img/icons/material-symbols/200/rounded/auto_fix.svg
  description: Purity and composition analysis. Peak profiling without calibration. Area-percentage reporting.

- title: Is X present in my sample?
  icon: /img/icons/material-symbols/200/rounded/timer.svg
  description: Detection and screening. A yes-or-no answer about whether a specific compound is present.

- title: Is this really the compound I think it is?
  icon: /img/icons/material-symbols/200/rounded/devices.svg
  description: Identity confirmation by mass spectrometry. We confirm your compound's molecular weight after chromatographic separation. Available when LC-MS launches.
