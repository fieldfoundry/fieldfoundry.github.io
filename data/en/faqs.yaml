- title: Getting Started
  faqs:
    - question: "How do I start working with you?"
      answer: "Tell us what you need to measure and what your samples are. We will recommend an approach, quote a price, and explain what you will receive. Most customers go from first contact to samples submitted within days."
    - question: "Do I need to know which analytical method to use?"
      answer: "No. You describe what you need to know (a concentration, a composition check, whether something is present). We determine the method, the instrument, and the conditions. That is what Method Setup is for."
    - question: "What is Method Setup?"
      answer: "We get your measurement working on our instruments, test it on your samples, and set it up so you can reorder in the future. It starts at £800."
    - question: "What if you have already measured my analyte for another customer?"
      answer: "Every method is configured for your specific samples and matrix. Even if we have measured the same compound before, your matrix may behave differently. Method Setup ensures the measurement works for your samples specifically."

- title: Pricing and Payment
  faqs:
    - question: "Why is there a batch fee?"
      answer: "Every batch requires instrument setup, calibration, blanks, and data review regardless of how many samples you send. The batch fee covers this fixed work. Larger batches are cheaper per sample because this fee is spread across more samples."
    - question: "Do you offer discounts?"
      answer: "Yes. We offer discounts for universities, research institutes, and registered nonprofits, and can discuss pricing for high-volume customers. Email hello@fieldfoundry.com to find out more."
    - question: "Does sample preparation cost extra?"
      answer: "Routine preparation (filtering, dilution, centrifugation) is built into your method's per-sample price during Setup. If your samples need a new extraction or cleanup protocol developed from scratch, that work is quoted separately during Method Setup."
    - question: "How do I pay?"
      answer: "Card payment via Stripe is the default. Purchase order terms (30 days) are available for approved customers."

- title: Samples and Results
  faqs:
    - question: "What sample formats do you accept?"
      answer: "Vials (1.5 mL or 2 mL) and 96-well plates. We provide specific sample preparation instructions after Method Setup so you know exactly how to prepare and send your samples."
    - question: "How quickly will I get results?"
      answer: "We work fast. Turnaround depends on your method and our current queue, and we provide an estimate when we quote. If you need results urgently, ask about priority turnaround when you get in touch."
    - question: "What do I get back?"
      answer: "Every order includes chromatograms and raw data files. Method Setup delivers a written description of your configured method. Sample Analysis delivers a results summary answering your question directly (concentrations, area-percentage composition, or detection statements). If you need a specific reporting format, let us know when you get in touch."
    - question: "Can I use your results for regulatory submissions?"
      answer: "Our services are built for research and development speed, not regulatory submission. We do not currently offer accredited, regulatory, clinical diagnostic, forensic, or release testing."

- title: Technical
  faqs:
    - question: "What instruments do you use?"
      answer: "We currently run in-house HPLC with UV/PDA/RID detection. We may be able to arrange mass spectrometry identity confirmation for suitable projects, and we are expanding our in-house capabilities."
    - question: "Can you measure compounds that do not absorb UV light?"
      answer: "Yes. Our Shimadzu instruments have refractive index detectors (RID) for sugars, polyols, organic acids, and other UV-transparent compounds. This is particularly useful for fermentation monitoring."
    - question: "Can you measure the purity of my compound?"
      answer: "Yes. How we measure it depends on your samples and what you need the data for. Tell us about your project and we will recommend the right approach."
